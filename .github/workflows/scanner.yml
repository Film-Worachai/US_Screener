name: US Scanner Bot

on:
  repository_dispatch:
    types: [run-scanner-bot]
  workflow_dispatch:

jobs:
  run-scanner:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Install Dependencies
        run: npm install @mathieuc/tradingview technicalindicators node-telegram-bot-api yahoo-finance2

      - name: Run Scanner Script
        run: node index.js
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}

      - name: Commit and Push Fallback Symbols
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          git add us_symbols_fallback.json
          
          git diff --staged --quiet || (git commit -m "🤖 Auto-update US fallback symbols" && git push)